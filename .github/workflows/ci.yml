# CI gate for auto-merge. The job name "test" is the required status check
# that gates merging (see branch protection on main). This is a Python project
# (no package.json), so the generic Node template installed by
# setup-auto-merge.sh is replaced with a real pytest run.
name: CI
on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg
        # The OBS end-to-end tests synthesize a video and cut a real clip; they
        # skipif ffmpeg is absent, but installing it exercises the full chain.
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest
