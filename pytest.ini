[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Keep stdout/stderr visible so we see the "All tests passed" print statements
# from legacy run_all() shims when tests are invoked directly. Quiet mode
# still reports the full pass/fail count.
addopts = -q

# Don't recurse into output dirs / third-party caches (leftover output_*
# folders from actual video runs get copied around on this Windows machine).
norecursedirs = output_* .git .omc __pycache__ docs node_modules
